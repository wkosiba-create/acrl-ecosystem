<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlantic Ecosystem Mapping — L2M</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#ffffff;color:#1a1a1a;font-size:14px}
.nav{display:flex;border-bottom:1px solid #e5e5e5;background:#f9f9f9;position:sticky;top:0;z-index:50}
.nav-btn{padding:12px 20px;font-size:13px;font-weight:500;border:none;background:transparent;color:#666;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#534AB7}
.nav-btn:hover:not(.active){background:#f0f0f0}
.view{padding:1.5rem;max-width:740px;margin:0 auto}
.section-header{font-size:11px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:0.07em;margin:1.75rem 0 1rem;padding-bottom:6px;border-bottom:1px solid #e5e5e5}
.section-header:first-child{margin-top:0}
.field{margin-bottom:1.1rem}
.label{display:block;font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:5px}
.req{color:#D85A30}
input[type=text],input[type=number],input[type=url],select,textarea{width:100%;padding:8px 11px;font-size:13px;border:1px solid #d0d0d0;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#7F77DD;box-shadow:0 0 0 3px rgba(127,119,221,0.12)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid #e5e5e5;border-radius:7px;cursor:pointer;background:#f9f9f9;transition:all 0.12s;user-select:none}
.check-item:hover{background:#f0f0f0}
.check-item input[type=checkbox],.check-item input[type=radio]{width:14px;height:14px;margin-top:1px;flex-shrink:0;accent-color:#534AB7}
.check-item label{font-size:12px;color:#1a1a1a;cursor:pointer;line-height:1.4;pointer-events:none}
.check-item.sel{background:#EEEDFE;border-color:#AFA9EC}
.radio-group{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.submit-btn{width:100%;padding:11px;font-size:14px;font-weight:500;background:#534AB7;color:white;border:none;border-radius:8px;cursor:pointer;margin-top:1rem;transition:background 0.15s}
.submit-btn:hover{background:#3C3489}
.submit-btn:disabled{background:#ccc;color:#888;cursor:not-allowed}
.trl-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.acrl-section{border:1px solid #e5e5e5;border-radius:8px;margin-bottom:8px;overflow:hidden}
.acrl-dim-header{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f9f9f9;cursor:pointer;user-select:none}
.acrl-dim-header:hover{background:#f0f0f0}
.acrl-dim-header input[type=checkbox]{accent-color:#534AB7;width:14px;height:14px;flex-shrink:0;pointer-events:none}
.acrl-dim-label{font-size:13px;font-weight:500;flex:1}
.acrl-dim-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.acrl-dim-body{padding:12px;display:none;border-top:1px solid #e5e5e5;background:#fff}
.acrl-dim-body.open{display:block}
.acrl-entry-exit{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lvl-label{font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
.trl-def{font-size:11px;color:#555;margin-top:4px;line-height:1.4;padding:5px 8px;background:#f5f5f5;border-radius:5px;display:none}
.trl-def.show{display:block}
.err{color:#D85A30;font-size:12px;margin-top:6px}
.success-box{text-align:center;padding:2.5rem 1rem}
.success-icon{font-size:48px;color:#1D9E75;margin-bottom:1rem}
.success-actions{display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap}
.action-btn{padding:10px 22px;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;transition:opacity 0.15s;display:inline-flex;align-items:center;gap:6px}
.action-btn.primary{background:#534AB7;color:white}
.action-btn.secondary{background:#f0f0f0;color:#1a1a1a;border:1px solid #d0d0d0}
.action-btn:hover:not(:disabled){opacity:0.85}
.action-btn:disabled{opacity:0.5;cursor:not-allowed}
.gen-status{display:none;align-items:center;gap:8px;color:#666;font-size:12px;padding:8px 0;justify-content:center;margin-top:0.75rem}
.gen-status.show{display:flex}
.spin{width:14px;height:14px;border:2px solid #e5e5e5;border-top-color:#534AB7;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.map-container{padding:1.25rem;max-width:100%}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat-card{background:#f5f5f5;border-radius:8px;padding:10px 12px}
.stat-label{font-size:11px;color:#666;margin-bottom:3px}
.stat-val{font-size:22px;font-weight:500;color:#1a1a1a}
.framework{width:100%;border:1px solid #e5e5e5;border-radius:8px;overflow:hidden;font-size:10px}
.fw-level-row{display:grid;grid-template-columns:100px repeat(9,1fr);background:#3C3489}
.fw-level-hdr{padding:4px 2px;color:white;font-weight:600;text-align:center;border-right:1px solid rgba(255,255,255,0.2);font-size:10px}
.fw-level-hdr:last-child{border-right:none}
.fw-dim-row{display:grid;grid-template-columns:100px repeat(9,1fr);border-bottom:1px solid #e5e5e5}
.fw-dim-row:last-child{border-bottom:none}
.fw-row-label{padding:6px 8px;font-size:10px;font-weight:500;color:#555;background:#f9f9f9;border-right:1px solid #e5e5e5;display:flex;align-items:center;gap:5px;line-height:1.3}
.fw-cell{position:relative;border-right:1px solid #e5e5e5;min-height:44px;display:flex;align-items:center;justify-content:center}
.fw-cell:last-child{border-right:none}
.heat-bg{position:absolute;inset:0;pointer-events:none;transition:background 0.4s,opacity 0.4s}
.dot-wrap{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:2px;padding:3px;align-items:center;justify-content:center}
.org-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid white;flex-shrink:0;position:relative;cursor:default}
.org-dot:hover::after{content:attr(data-name);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;font-size:9px;white-space:nowrap;padding:3px 6px;border-radius:4px;z-index:100;pointer-events:none}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#555}
.leg-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid white;flex-shrink:0;box-shadow:0 0 0 1px #ccc}
.live-badge{display:flex;align-items:center;gap:5px;font-size:12px;color:#1D9E75;font-weight:500}
.live-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.map-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.sm-btn{padding:6px 12px;font-size:12px;background:#fff;border:1px solid #d0d0d0;border-radius:7px;cursor:pointer;color:#555;display:inline-flex;align-items:center;gap:4px;transition:background 0.12s}
.sm-btn:hover{background:#f0f0f0}
.admin-view{padding:1.5rem}
.dl-btn{padding:8px 16px;font-size:12px;font-weight:500;background:#534AB7;color:white;border:none;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background 0.15s}
.dl-btn:hover{background:#3C3489}
.admin-table{width:100%;font-size:11px;border-collapse:collapse;margin-top:1rem}
.admin-table th{text-align:left;padding:7px 8px;font-size:10px;font-weight:600;color:#666;border-bottom:1px solid #e5e5e5;background:#f9f9f9;white-space:nowrap}
.admin-table td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.admin-table tr:hover td{background:#fafafa}
.del-btn{padding:2px 8px;font-size:10px;color:#D85A30;background:transparent;border:1px solid #D85A30;border-radius:4px;cursor:pointer}
.del-btn:hover{background:#FAECE7}
.pass-screen{max-width:300px;margin:3rem auto;text-align:center}
.pass-screen h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.pass-screen input{margin-bottom:0.75rem}
.pass-screen button{width:100%;padding:9px;font-size:13px;font-weight:500;background:#534AB7;color:white;border:none;border-radius:8px;cursor:pointer}
.other-input{margin-top:6px;display:none}
.other-input.show{display:block}
.prov-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:#EEEDFE;color:#3C3489;font-weight:500}
.workshop-badge{background:#534AB7;color:white;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:1rem}
.empty-map{text-align:center;padding:2rem;color:#888;font-size:13px;margin-top:1rem;border:1px dashed #e5e5e5;border-radius:8px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── Data ──────────────────────────────────────────────────────────────────
const DIMS = [
  { id:'trl',    label:'Technology Readiness (TRL)',    short:'Tech / TRL', color:'97C459' },
  { id:'frl',    label:'Funding Readiness (FRL)',       short:'Funding',    color:'FAC775' },
  { id:'brl',    label:'Business Readiness (BRL)',      short:'Business',   color:'5DCAA5' },
  { id:'iprl',   label:'IP Readiness (IP-RL)',          short:'IP',         color:'AFA9EC' },
  { id:'mrl',    label:'Manufacturing Readiness (MRL)', short:'Mfg',        color:'85B7EB' },
  { id:'teamrl', label:'Team Readiness (TEAM-RL)',      short:'Team',       color:'F0997B' },
];

// TRL excluded from ACRL section (it has its own top-level question)
const ACRL_DIMS = DIMS.filter(d => d.id !== 'trl');

const TRL_DEFS = {
  1:'New Principles Observed',
  2:'Concept Formulated',
  3:'Proof of Concept',
  4:'Component Validation (In Lab)',
  5:'Component Validation (In Relevant Environment)',
  6:'System Prototype (In Relevant Environment)',
  7:'System Prototype (In Operational Environment)',
  8:'System Qualified (In Operational Environment)',
  9:'System Deployed (In Operational Environment)'
};

const ACRL_DEFS = {
  frl:{ 1:'Institutional Support',2:'Discovery Funds',3:'Feasibility Funds',4:'Translational Funds',5:'Prototype Capital',6:'Validation Capital',7:'Pilot Capital',8:'Market Entry Capital',9:'Growth Capital' },
  brl:{ 1:'Scientific Discovery',2:'Concept Application',3:'Desktop Research',4:'Primary Market Research',5:'Business Model Refinement [Messy Middle]',6:'Business Model Refinement [Messy Middle]',7:'Commercial and Product Validation',8:'Pilots',9:'Recurring Sales' },
  iprl:{ 1:'New Knowledge',2:'Utility Formulated',3:'Invention',4:'IP Strategy Determined',5:'Claims Drafted',6:'Provisional Patent',7:'Non-Provisional PCT',8:'Commercial Clearance',9:'Portfolio Defense' },
  mrl:{ 1:'Pre-Manufacturing',2:'Manufacturing Concept for Invention',3:'Ad-Hoc Fabrication',4:'Production Feasibility Assessed',5:'Pre-Production Process',6:'High-Fidelity Prototype Assembly',7:'Production Relevant Environment',8:'Low Rate Initial Production',9:'Full-Scale Production' },
  teamrl:{ 1:'Pure Academic Inquiry',2:'Research Unit',3:'Technical Execution',4:'Designated Commercial Lead',5:'Organizational Maturity & Readiness [Messy Middle]',6:'Organizational Maturity & Readiness [Messy Middle]',7:'Organizational Maturity & Readiness [Messy Middle]',8:'Executive Leadership Transition & Governance',9:'Executive Management' },
};

const ORG_TYPES = ['Business Accelerator / Incubator (BAI)','Venture Capital (VC) Firm / Institutional Investor','Angel Network / Angel Investment Group','Technology Transfer / Commercialization Office (TTO)','Federal/Provincial Innovation Granting Agency or Program Administrator','Academic Research Lab / Post-Secondary Institute','Private Sector Corporation / Industry Stakeholder','Other'];
const PROVINCES_ALL = ['AB','BC','MB','NB','NL','NS','ON','PE','QC','SK','NT','NU','YT','National (Federal)'];
const ROLES = ['Executive Director / Director / Management','Program Manager / Coordinator','Principal Investigator (PI) / Faculty Researcher','Founder / SME Owner','Other'];
const AFFILIATIONS = ['Post-Secondary Affiliated (University, College, or CÉGEP)','Hospital or Academic Health Science Centre Affiliated','Community-Based / Non-Profit Independent','Privately Owned / For-Profit Entity','Other'];
const FUNDING_SRCS = ['Federal Government Granting Councils (e.g., ISED, Tri-Agency, NRC-IRAP)','Provincial/Territorial Government Funding','Municipal Government Funding','Philanthropic Foundation / Non-Profit Granting Body','Fee-for-service / Client Fees','Corporate Sponsorship / Private Donation','Investment Fund Management Fees / Equity Returns','Other'];
const OFFERINGS = ['Infrastructure: Co-work, office, or dedicated desk space','Infrastructure: Wet lab, dry lab, maker space, or specialized equipment access','Human Capital: Business coaching, executive mentoring, or leadership development','Market Access: Trade and export support','Ecosystem Access: Networking events, matchmaking, and corporate introductions','Financial Capital: Direct funding, micro-grants, or facilitated investor matching','Compliance Support: Regulatory assistance (e.g., Health Canada, FDA)','IP: Education, patent/trademark strategies, and licensing support','Technical Asset Development: Prototyping, MVP testing, or engineering assistance','Other'];
const STAGES = ['Ideation / Concept Stage','Validation / MVP Development','Early Traction / Seed Stage','Scaling / High-Growth (Series A+)'];
const SECTORS = ['Sector-Agnostic / General Tech','Agriculture & Agri-Food','Advanced Materials & Advanced Manufacturing','Clean Technologies','Digital Technologies & ICT','Life Sciences & Advanced Healthcare','Natural Resources (Extractive)','Consumer Goods, Retail & E-commerce','Financial Services & FinTech','Social Innovation, Culture & Tourism','Other'];
const DOT_COLORS = ['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517','#A32D2D','#0F6E56','#993C1D','#185FA5','#3B6D11','#7B4EA6','#C0782A'];
const ADMIN_PASS = 'L2M2026';

// ─── State ─────────────────────────────────────────────────────────────────
let submissions = [];
let currentView = 'survey';
let submitted = false;
let lastSubmission = null;
let adminAuthed = false;
let liveTimer = null;

// ─── API ───────────────────────────────────────────────────────────────────
const API = '/api';

async function loadSubs() {
  try {
    const r = await fetch(`${API}/submissions`);
    submissions = await r.json();
  } catch(e) { submissions = []; }
}

async function saveSub(sub) {
  const r = await fetch(`${API}/submissions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sub)
  });
  const data = await r.json();
  return data.id;
}

async function deleteSub(id) {
  await fetch(`${API}/submissions?id=${id}`, { method: 'DELETE' });
  await loadSubs();
  render();
}

// ─── Form helpers ──────────────────────────────────────────────────────────
function makeCheckItem(name, value, label, isRadio) {
  const t = isRadio ? 'radio' : 'checkbox';
  const sid = `ci_${name}_${value.replace(/\W/g,'_').substring(0,30)}`;
  const safeVal = value.replace(/'/g, "\\'");
  return `<div class="check-item" onclick="toggleCheck('${name}','${safeVal}',${isRadio})">
    <input type="${t}" name="${name}" value="${value}" id="${sid}">
    <label for="${sid}">${label}</label>
  </div>`;
}

function toggleCheck(name, value, isRadio) {
  if (isRadio) {
    document.querySelectorAll(`[name="${name}"]`).forEach(i => {
      i.checked = false;
      i.closest('.check-item').classList.remove('sel');
    });
  }
  const t = document.querySelector(`[name="${name}"][value="${value}"]`);
  if (!t) return;
  if (!isRadio) { t.checked = !t.checked; }
  else { t.checked = true; }
  t.closest('.check-item').classList.toggle('sel', t.checked);

  if (value === 'Other' || value.startsWith('Other')) {
    const wrap = document.getElementById(`other_${name}`);
    if (wrap) {
      const anyOther = !!document.querySelector(`[name="${name}"][value="${value}"]:checked`);
      wrap.classList.toggle('show', anyOther);
    }
  }
}

function trlSelect(id, label) {
  const opts = [1,2,3,4,5,6,7,8,9].map(i =>
    `<option value="${i}">TRL ${i} — ${TRL_DEFS[i]}</option>`
  ).join('');
  return `<div>
    <div class="lvl-label">${label}</div>
    <select id="${id}" onchange="showTrlDef('${id}')">
      <option value="">Select TRL level...</option>${opts}
    </select>
    <div class="trl-def" id="${id}_def"></div>
  </div>`;
}

function showTrlDef(id) {
  const sel = document.getElementById(id);
  const def = document.getElementById(id + '_def');
  if (sel && def) {
    const v = parseInt(sel.value);
    if (v && TRL_DEFS[v]) { def.textContent = TRL_DEFS[v]; def.classList.add('show'); }
    else def.classList.remove('show');
  }
}

function acrlDimBlock(dim) {
  const defs = ACRL_DEFS[dim.id];
  const makeOpts = () => Object.entries(defs).map(([k,v]) =>
    `<option value="${k}">${dim.short} Level ${k} — ${v}</option>`
  ).join('');
  return `<div class="acrl-section">
    <div class="acrl-dim-header" onclick="toggleAcrlDim('${dim.id}')">
      <input type="checkbox" id="acrl_cb_${dim.id}">
      <div class="acrl-dim-color" style="background:#${dim.color}"></div>
      <div class="acrl-dim-label">${dim.label}</div>
    </div>
    <div class="acrl-dim-body" id="acrl_body_${dim.id}">
      <div class="acrl-entry-exit">
        <div>
          <div class="lvl-label">Minimum level for entry into program</div>
          <select id="acrl_entry_${dim.id}" onchange="showAcrlDef('${dim.id}','entry')">
            <option value="">Select level...</option>${makeOpts()}
          </select>
          <div class="trl-def" id="acrl_entry_${dim.id}_def"></div>
        </div>
        <div>
          <div class="lvl-label">Expected / average level at exit</div>
          <select id="acrl_exit_${dim.id}" onchange="showAcrlDef('${dim.id}','exit')">
            <option value="">Select level...</option>${makeOpts()}
          </select>
          <div class="trl-def" id="acrl_exit_${dim.id}_def"></div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleAcrlDim(id) {
  const cb = document.getElementById('acrl_cb_' + id);
  const body = document.getElementById('acrl_body_' + id);
  cb.checked = !cb.checked;
  body.classList.toggle('open', cb.checked);
}

function showAcrlDef(dimId, type) {
  const sel = document.getElementById(`acrl_${type}_${dimId}`);
  const def = document.getElementById(`acrl_${type}_${dimId}_def`);
  if (sel && def) {
    const v = sel.value;
    const label = v !== '' && ACRL_DEFS[dimId] && ACRL_DEFS[dimId][v];
    if (label) { def.textContent = label; def.classList.add('show'); }
    else def.classList.remove('show');
  }
}

function getChecked(name) {
  return Array.from(document.querySelectorAll(`[name="${name}"]:checked`)).map(i => i.value);
}
function getRadio(name) {
  const i = document.querySelector(`[name="${name}"]:checked`);
  return i ? i.value : '';
}

// ─── Survey render ─────────────────────────────────────────────────────────
function renderSurvey() {
  if (submitted) {
    return `<div class="view"><div class="success-box">
      <div class="success-icon"><i class="ti ti-circle-check"></i></div>
      <h2 style="font-size:18px;font-weight:500;margin-bottom:0.5rem">Submission received!</h2>
      <p style="color:#666;font-size:13px;margin-bottom:0.25rem">Your organization has been placed on the live ecosystem map.</p>
      <p style="color:#666;font-size:13px">Look up at the screen to see results build in real time.</p>
      <div class="success-actions">
        <button class="action-btn primary" id="pptx-btn" onclick="downloadPptx()">
          <i class="ti ti-presentation"></i> Download my summary slides
        </button>
        <button class="action-btn secondary" onclick="resetForm()">Submit another</button>
      </div>
      <div class="gen-status" id="gen-status">
        <div class="spin"></div><span id="gen-msg">Generating your presentation...</span>
      </div>
    </div></div>`;
  }

  return `<div class="view">
    <div style="margin-bottom:1.25rem">
      <div class="workshop-badge">Atlantic Ecosystem Mapping — June 4, 2026</div>
      <p style="font-size:12px;color:#666;margin-top:6px">Fields marked <span style="color:#D85A30">*</span> are required. Your response will appear live on the shared map.</p>
    </div>

    <div class="section-header">Section 1 — Administrative &amp; organization details</div>
    <div class="field">
      <label class="label">Organization legal name <span class="req">*</span></label>
      <input type="text" id="f_orgname" placeholder="e.g. Innovacorp">
    </div>
    <div class="field">
      <label class="label">Program / offering name <span style="color:#888;font-size:11px;font-weight:400">(if applicable)</span></label>
      <input type="text" id="f_progname" placeholder="e.g. Velocity Incubator at University of Waterloo">
    </div>
    <div class="field">
      <label class="label">Website</label>
      <input type="url" id="f_website" placeholder="https://">
    </div>
    <div class="field">
      <label class="label">Primary province / territory of operation <span class="req">*</span></label>
      <select id="f_province">
        <option value="">Select province or territory...</option>
        ${PROVINCES_ALL.map(p => `<option value="${p}">${p}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label class="label">Your primary role / title <span class="req">*</span></label>
      <div class="check-grid">${ROLES.map(r => makeCheckItem('role', r, r, true)).join('')}</div>
      <div class="other-input" id="other_role">
        <input type="text" id="f_role_other" placeholder="Please specify your role...">
      </div>
    </div>

    <div class="section-header">Section 2 — Institutional typology &amp; governance</div>
    <div class="field">
      <label class="label">Institutional structure <span class="req">*</span></label>
      <div class="check-grid">${ORG_TYPES.map(t => makeCheckItem('orgtype', t, t, true)).join('')}</div>
      <div class="other-input" id="other_orgtype">
        <input type="text" id="f_orgtype_other" placeholder="Please describe your institutional structure...">
      </div>
    </div>
    <div class="field">

async function submitForm() {
  const orgname = document.getElementById('f_orgname')?.value?.trim();
  const province = document.getElementById('f_province')?.value;
  const role = getRadio('role');
  const orgtype = getRadio('orgtype');
  const intake = getRadio('intake');
  const structure = getRadio('structure');
  const err = document.getElementById('form_err');

  if (!orgname || !province || !role || !orgtype || !intake || !structure) {
    if (err) err.textContent = 'Please complete all required fields (marked with *) before submitting.';
    document.getElementById('form_err').scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  if (err) err.textContent = '';

  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  const acrlData = {};
  ACRL_DIMS.forEach(d => {
    const cb = document.getElementById('acrl_cb_' + d.id);
    if (cb && cb.checked) {
      acrlData[d.id] = {
        entry: document.getElementById(`acrl_entry_${d.id}`)?.value || '',
        exit:  document.getElementById(`acrl_exit_${d.id}`)?.value  || ''
      };
    }
  });

  const sub = {
    orgname,
    progname:   document.getElementById('f_progname')?.value?.trim() || '',
    website:    document.getElementById('f_website')?.value?.trim() || '',
    province,
    role, role_other: document.getElementById('f_role_other')?.value || '',
    orgtype, orgtype_other: document.getElementById('f_orgtype_other')?.value || '',
    affiliations: getChecked('affil'),
    funding:    getChecked('funding'),
    intake, structure,
    duration:   document.getElementById('f_duration')?.value || '',
    offerings:  getChecked('offerings'),
    stages:     getChecked('stages'),
    sectors:    getChecked('sectors'),
    trl_min:    document.getElementById('f_trl_min')?.value  || '',
    trl_exit:   document.getElementById('f_trl_exit')?.value || '',
    acrl:       acrlData,
    missing:    document.getElementById('f_missing')?.value?.trim()   || '',
    selection:  document.getElementById('f_selection')?.value?.trim() || '',
    kpis:       document.getElementById('f_kpis')?.value?.trim()      || ''
  };

  await saveSub(sub);
  lastSubmission = sub;
  submitted = true;
  render();
}

function resetForm() { submitted = false; lastSubmission = null; render(); }

async function downloadPptx() {
  if (!lastSubmission) return;
  const btn = document.getElementById('pptx-btn');
  const status = document.getElementById('gen-status');
  const msg = document.getElementById('gen-msg');
  if (btn) btn.disabled = true;
  if (status) status.classList.add('show');
  if (msg) msg.textContent = 'Generating your presentation...';
  try {
    const resp = await fetch('/api/generate-pptx', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(lastSubmission)
    });
    if (!resp.ok) throw new Error('Server error');
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(lastSubmission.orgname || 'org').replace(/[^a-z0-9]/gi,'_')}_L2M_summary.pptx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if (msg) msg.textContent = '✓ Download started!';
    if (btn) btn.disabled = false;
    setTimeout(() => { if (status) status.classList.remove('show'); }, 3000);
  } catch(e) {
    if (msg) msg.textContent = 'Generation failed — please try again.';
    if (btn) btn.disabled = false;
  }
}

// ─── Map render ────────────────────────────────────────────────────────────
function renderMap() {
  // Show ALL submissions (not just Atlantic)
  const all = submissions;
  const acrlSubs = all.filter(s => s.acrl && Object.keys(s.acrl).length > 0);
  const trlSubs  = all.filter(s => s.trl_min || s.trl_exit);
  const provinces = [...new Set(all.map(s => s.province))].length;

  // For TRL row: use trl_min / trl_exit from top-level question
  // For ACRL dims: use acrl object (which excludes trl)
  // Max heat across all cells for normalization
  const maxHeat = Math.max(1,
    ...DIMS.map(dim => {
      if (dim.id === 'trl') {
        return Math.max(...[1,2,3,4,5,6,7,8,9].map(lv =>
          all.filter(s => s.trl_min && s.trl_exit &&
            parseInt(s.trl_min) <= lv && parseInt(s.trl_exit) >= lv).length
        ));
      }
      return Math.max(...[1,2,3,4,5,6,7,8,9].map(lv =>
        all.filter(s => s.acrl && s.acrl[dim.id] &&
          parseInt(s.acrl[dim.id].entry || 0) <= lv &&
          parseInt(s.acrl[dim.id].exit  || 9) >= lv).length
      ));
    })
  );

  function cellOrgs(dim, lv) {
    if (dim.id === 'trl') {
      return all.filter(s => s.trl_min && s.trl_exit &&
        parseInt(s.trl_min) <= lv && parseInt(s.trl_exit) >= lv);
    }
    return all.filter(s => s.acrl && s.acrl[dim.id] &&
      parseInt(s.acrl[dim.id].entry || 0) <= lv &&
      parseInt(s.acrl[dim.id].exit  || 9) >= lv);
  }

  return `<div class="map-container">
    <div class="map-toolbar">
      <div style="font-size:15px;font-weight:600">Innovation Ecosystem — Live Map</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <button class="sm-btn" onclick="loadSubs().then(renderView)">
          <i class="ti ti-refresh" style="font-size:13px"></i> Refresh
        </button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Organizations</div><div class="stat-val">${all.length}</div></div>
      <div class="stat-card"><div class="stat-label">Provinces/territories</div><div class="stat-val">${provinces}</div></div>
      <div class="stat-card"><div class="stat-label">With TRL data</div><div class="stat-val">${trlSubs.length}</div></div>
      <div class="stat-card"><div class="stat-label">ACRL responses</div><div class="stat-val">${acrlSubs.length}</div></div>
    </div>
    <div class="framework">
      <div class="fw-level-row">
        <div class="fw-level-hdr" style="text-align:left;padding-left:8px;font-size:9px">Level →</div>
        ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="fw-level-hdr">${n}</div>`).join('')}
      </div>
      ${DIMS.map(dim => {
        return `<div class="fw-dim-row">
          <div class="fw-row-label">
            <span style="width:9px;height:9px;border-radius:50%;background:#${dim.color};display:inline-block;flex-shrink:0"></span>
            ${dim.short}
          </div>
          ${[1,2,3,4,5,6,7,8,9].map(lv => {
            const orgs = cellOrgs(dim, lv);
            const alpha = orgs.length > 0 ? Math.min(0.85, 0.18 + (orgs.length / maxHeat) * 0.67) : 0;
            const dots = orgs.slice(0, 6).map(s => {
              const idx = all.indexOf(s);
              return `<div class="org-dot" style="background:${DOT_COLORS[idx % DOT_COLORS.length]}" data-name="${s.orgname}"></div>`;
            }).join('');
            const extra = orgs.length > 6 ? `<div style="font-size:8px;color:#666;line-height:1">+${orgs.length-6}</div>` : '';
            return `<div class="fw-cell">
              <div class="heat-bg" style="background:#${dim.color};opacity:${alpha}"></div>
              <div class="dot-wrap">${dots}${extra}</div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
    <div class="legend">
      <span style="font-size:10px;font-weight:600;color:#666;margin-right:4px">Organizations:</span>
      ${all.slice(0, 14).map((s, i) => `
        <div class="leg-item">
          <div class="leg-dot" style="background:${DOT_COLORS[i % DOT_COLORS.length]}"></div>
          <span>${s.orgname}</span>
        </div>`).join('')}
      ${all.length > 14 ? `<span style="font-size:10px;color:#888">+${all.length - 14} more</span>` : ''}
    </div>
    ${all.length === 0 ? `<div class="empty-map">No submissions yet — responses will appear here as attendees submit.</div>` : ''}
  </div>`;
}

// ─── Admin render ──────────────────────────────────────────────────────────
function renderAdmin() {
  if (!adminAuthed) {
    return `<div class="admin-view"><div class="pass-screen">
      <h3>Admin access</h3>
      <input type="password" id="pass_input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPass()">
      <div id="pass_err" style="color:#D85A30;font-size:11px;margin-bottom:8px;min-height:16px"></div>
      <button onclick="checkPass()">Unlock</button>
      <p style="font-size:11px;color:#888;margin-top:1rem">Default password: L2M2026</p>
    </div></div>`;
  }

  return `<div class="admin-view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:600">All submissions <span style="font-size:13px;font-weight:400;color:#666">(${submissions.length} total)</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="sm-btn" onclick="loadSubs().then(renderView)">
          <i class="ti ti-refresh" style="font-size:12px"></i> Refresh
        </button>
        <button class="dl-btn" onclick="downloadCSV()">
          <i class="ti ti-download" style="font-size:13px"></i> Download CSV
        </button>
        <button class="dl-btn" style="background:#D85A30" onclick="if(confirm('Clear ALL submissions? This cannot be undone.'))clearAll()">
          Clear all
        </button>
      </div>
    </div>
    ${submissions.length === 0
      ? `<div class="empty-map">No submissions yet.</div>`
      : `<div style="overflow-x:auto">
        <table class="admin-table">
          <thead><tr>
            <th>#</th><th>Organization</th><th>Type</th><th>Province</th>
            <th>TRL entry→exit</th><th>ACRL dims</th><th>Submitted</th><th></th>
          </tr></thead>
          <tbody>
            ${submissions.map((s, i) => `<tr>
              <td style="color:#888">${i+1}</td>
              <td>
                <div style="font-weight:500">${s.orgname || '—'}</div>
                ${s.progname ? `<div style="font-size:10px;color:#888">${s.progname}</div>` : ''}
              </td>
              <td style="font-size:10px;max-width:100px">${(s.orgtype || '—').split('(')[0].trim()}</td>
              <td><span class="prov-tag">${s.province || '—'}</span></td>
              <td style="font-size:11px">${s.trl_min ? `TRL ${s.trl_min} → TRL ${s.trl_exit||'?'}` : '—'}</td>
              <td style="font-size:10px">${Object.keys(s.acrl||{}).map(id => DIMS.find(d=>d.id===id)?.short||id).join(', ')||'—'}</td>
              <td style="font-size:10px;color:#888">${s.ts ? new Date(s.ts).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'}</td>
              <td><button class="del-btn" onclick="if(confirm('Delete this entry?'))deleteSub(${s.id})">Del</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`}
  </div>`;
}

function checkPass() {
  const v = document.getElementById('pass_input')?.value;
  if (v === ADMIN_PASS) { adminAuthed = true; render(); }
  else { const e = document.getElementById('pass_err'); if (e) e.textContent = 'Incorrect password.'; }
}

async function clearAll() {
  for (const s of submissions) {
    await fetch(`${API}/submissions?id=${s.id}`, { method: 'DELETE' });
  }
  submissions = [];
  render();
}

function downloadCSV() {
  const headers = ['ID','Org Name','Program Name','Website','Province','Role','Org Type',
    'Affiliations','Funding Sources','Intake','Structure','Duration (months)',
    'Offerings','Stages','Sectors','TRL Entry','TRL Exit',
    'ACRL Dimensions','ACRL Entry/Exit Detail',
    'Missing Framework Elements','Selection Criteria','KPIs','Submitted At'];
  const rows = submissions.map(s => [
    s.id,
    `"${(s.orgname||'').replace(/"/g,"'")}"`,
    `"${(s.progname||'').replace(/"/g,"'")}"`,
    `"${s.website||''}"`,
    s.province||'',
    `"${s.role||''}"`,
    `"${s.orgtype||''}"`,
    `"${(s.affiliations||[]).join('; ')}"`,
    `"${(s.funding||[]).join('; ')}"`,
    s.intake||'', s.structure||'', s.duration||'',
    `"${(s.offerings||[]).join('; ')}"`,
    `"${(s.stages||[]).join('; ')}"`,
    `"${(s.sectors||[]).join('; ')}"`,
    s.trl_min||'', s.trl_exit||'',
    `"${Object.keys(s.acrl||{}).join('; ')}"`,
    `"${Object.entries(s.acrl||{}).map(([k,v])=>`${k}: entry ${v.entry||'?'} → exit ${v.exit||'?'}`).join('; ')}"`,
    `"${(s.missing||'').replace(/"/g,"'")}"`,
    `"${(s.selection||'').replace(/"/g,"'")}"`,
    `"${(s.kpis||'').replace(/"/g,"'")}"`,
    `"${s.ts||''}"`
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'acrl_ecosystem_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── Nav & render loop ─────────────────────────────────────────────────────
function renderNav() {
  return `<div class="nav">
    <button class="nav-btn ${currentView==='survey'?'active':''}" onclick="switchView('survey')">Questionnaire</button>
    <button class="nav-btn ${currentView==='map'?'active':''}" onclick="switchView('map')">Live Map</button>
    <button class="nav-btn ${currentView==='admin'?'active':''}" onclick="switchView('admin')">Admin</button>
  </div>`;
}

function switchView(v) {
  currentView = v;
  if (v === 'map' || v === 'admin') loadSubs().then(renderView);
  else render();
}

function renderView() {
  const root = document.getElementById('root');
  let body = '';
  if (currentView === 'survey') body = renderSurvey();
  else if (currentView === 'map') body = renderMap();
  else body = renderAdmin();
  root.innerHTML = renderNav() + body;
}

function render() { renderView(); }

// Auto-refresh map every 8 seconds
if (liveTimer) clearInterval(liveTimer);
liveTimer = setInterval(() => {
  if (currentView === 'map') loadSubs().then(renderView);
}, 8000);

render();
</script>
